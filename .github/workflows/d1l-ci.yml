name: d1l-ci

on:
  workflow_dispatch:
    inputs:
      include_sd_bridge:
        description: "Build RP2040 SD bridge artifacts and run SD bridge host dry-runs"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  change-filter:
    runs-on: ubuntu-latest
    outputs:
      include_sd_bridge: ${{ steps.scope.outputs.include_sd_bridge }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Decide SD bridge scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          include_sd_bridge=false
          reason=esp32_only
          core_sd_disabled=false
          if grep -Eq '^set\(D1L_RELEASE_PROFILE "core_1_0" CACHE STRING' CMakeLists.txt \
            && grep -Eq '^set\(D1L_SD_HISTORY_MODE "disabled" CACHE STRING' CMakeLists.txt; then
            core_sd_disabled=true
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.include_sd_bridge }}" == "true" ]]; then
              include_sd_bridge=true
              reason=manual_dispatch
            fi
          else
            : > changed-files.txt
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}" || true
              git fetch --no-tags --prune --depth=1 origin "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" || true
              git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt \
                || git diff --name-only "origin/${{ github.base_ref }}"...HEAD > changed-files.txt \
                || true
            elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt \
                || git diff --name-only HEAD~1 HEAD > changed-files.txt \
                || true
            else
              git diff --name-only HEAD~1 HEAD > changed-files.txt || git ls-files > changed-files.txt
            fi

            if grep -E '^(firmware/rp2040_sd_bridge/|firmware/rp2040_sd_smoke/|tools/rp2040_sd_protocol.py|scripts/(rp2040_|sd_).*_d1l.py|scripts/flash_rp2040_sd_bridge_uf2.py|tests/test_rp2040_sd_bridge_target.py|tests/test_storage_status_contract.py|docs/(SD_BRIDGE_PROTOCOL_D1L|RP2040_SD_BRIDGE_FLASH_D1L|D1L_SD_CARD_GUIDED_INSTALL)\.md)' changed-files.txt >/dev/null; then
              if [[ "$core_sd_disabled" == "true" ]]; then
                reason=core_sd_disabled
              else
                include_sd_bridge=true
                reason=sd_bridge_paths
              fi
            fi
          fi

          echo "include_sd_bridge=${include_sd_bridge}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "include_sd_bridge=${include_sd_bridge} (${reason})"

  host-checks:
    needs: change-filter
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Set up pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.6"
          architecture: x64
          check-latest: false

      - name: Verify and install hash-locked Python tools
        shell: pwsh
        run: |
          $buildInputs = Get-Content -LiteralPath ".github/d1l-build-inputs.json" -Raw | ConvertFrom-Json
          $requirementsPath = [string]$buildInputs.host_python.requirements.path
          $expectedHash = [string]$buildInputs.host_python.requirements.sha256
          $actualHash = (Get-FileHash -LiteralPath $requirementsPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Host requirements lock hash mismatch: expected $expectedHash, got $actualHash"
          }
          if ((python --version 2>&1) -notmatch '^Python 3\.13\.6$') {
            throw "Pinned Python 3.13.6 is not active"
          }
          New-Item -ItemType Directory -Force -Path "artifacts/build-inputs" | Out-Null
          Copy-Item -LiteralPath ".github/d1l-build-inputs.json" -Destination "artifacts/build-inputs/d1l-build-inputs.json"
          Copy-Item -LiteralPath $requirementsPath -Destination "artifacts/build-inputs/ci-host-windows.txt"
          python -m pip install --disable-pip-version-check --require-hashes -r $requirementsPath
          python -m pip check
          python -m pip list --format=json | Set-Content -LiteralPath "artifacts/build-inputs/ci-host-windows-installed.json" -Encoding utf8NoBOM

      - name: Record exact candidate scope
        shell: pwsh
        env:
          D1L_INCLUDE_SD_BRIDGE: ${{ needs.change-filter.outputs.include_sd_bridge }}
          D1L_SCOPE_REASON: ${{ needs.change-filter.outputs.reason }}
        run: |
          $payload = [ordered]@{
            schema = 1
            kind = "d1l_candidate_scope"
            source_commit = $env:GITHUB_SHA
            workflow_run_id = [string]$env:GITHUB_RUN_ID
            workflow_run_attempt = [string]$env:GITHUB_RUN_ATTEMPT
            repository = $env:GITHUB_REPOSITORY
            workflow = "d1l-ci"
            event = $env:GITHUB_EVENT_NAME
            include_sd_bridge = [System.Convert]::ToBoolean($env:D1L_INCLUDE_SD_BRIDGE)
            scope_reason = $env:D1L_SCOPE_REASON
            release_profile = "core_1_0"
            sd_history_mode = "disabled"
          }
          $path = "artifacts/build-inputs/d1l-candidate-scope.json"
          $payload | ConvertTo-Json | Set-Content -LiteralPath $path -Encoding utf8NoBOM

      - name: Checksum exact host build inputs
        shell: pwsh
        run: |
          $checksumRows = Get-ChildItem -LiteralPath "artifacts/build-inputs" -File |
            Where-Object Name -ne "SHA256SUMS.txt" |
            Sort-Object Name |
            ForEach-Object {
              "{0}  ./{1}" -f (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant(), $_.Name
            }
          $checksumRows | Set-Content -LiteralPath "artifacts/build-inputs/SHA256SUMS.txt" -Encoding ascii

      - name: Host tests
        run: python -m pytest tests -q

      - name: Validate completion ledger
        run: python ./scripts/completion_ledger.py validate --check-generated

      - name: Smoke dry run
        run: python ./scripts/smoke_d1l.py --dry-run

      - name: UI corruption probe dry run
        run: python ./scripts/ui_corruption_probe_d1l.py --dry-run --rounds 20

      - name: UI scroll probe dry run
        run: python ./scripts/scroll_probe_d1l.py --dry-run --screens home,public_messages,dm_thread,nodes,packets,settings,storage,storage_card,storage_data,wifi,map,map_options,map_location,map_cache

      - name: Soak dry run
        run: python ./scripts/soak_d1l.py --dry-run --duration-sec 60 --sample-interval-sec 15 --active-dm-fingerprint 0123456789ABCDEF --active-dm-text test

      - name: WP-01 storage-active soak dry run
        run: python ./scripts/storage_active_soak_d1l.py --dry-run --expected-firmware-commit ${{ github.sha }}

      - name: SD file canary dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_file_canary_d1l.py --dry-run

      - name: SD retained history acceptance dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_retained_history_acceptance_d1l.py --dry-run --token ci-dry-run

      - name: SD remove reinsert acceptance dry run
        run: python ./scripts/sd_remove_reinsert_acceptance_d1l.py --expected-firmware-commit ${{ github.sha }} --dry-run --strict-evidence --out artifacts/host/sd-remove-reinsert-strict-dryrun.json

      - name: SD map tile canary dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_map_tile_canary_d1l.py --dry-run --token ci-dry-run

      - name: SD reboot remount acceptance dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_reboot_remount_acceptance_d1l.py --dry-run --token ci-dry-run

      - name: SD export canary dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_export_canary_d1l.py --dry-run --token ci-dry-run

      - name: SD diagnostic export dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_diagnostic_export_d1l.py --dry-run --token ci-dry-run

      - name: SD data export dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_data_export_d1l.py --dry-run --token ci-dry-run

      - name: RP2040 SD bridge preflight dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/rp2040_sd_bridge_preflight_d1l.py --dry-run --artifact-dir artifacts/rp2040-sd-bridge

      - name: SD boot prepare acceptance dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_boot_prepare_acceptance_d1l.py --dry-run --scenario all

      - name: RF full acceptance dry run
        run: python ./scripts/rf_full_acceptance_d1l.py --dry-run --commit ci-dry-run

      - name: UI simulator screenshots
        run: |
          python ./tools/ui_simulator.py --out artifacts/ui-sim
          python ./tools/ui_simulator.py --scenario large-mesh --out artifacts/ui-sim-large
          python ./tools/ui_simulator.py --scenario storage-states --out artifacts/ui-sim-storage
          python ./tools/ui_simulator.py --scenario map-ready --view map --view map_options --view map_location --view map_cache --out artifacts/ui-sim-map-ready

      - name: Checksum contract tests
        run: python -m pytest -q tests/test_checksum_manifest.py tests/test_package_release_d1l.py

      - name: Release gate audit dry run
        run: python ./scripts/release_gate_audit_d1l.py --out artifacts/release-gate/d1l-release-gate-audit-ci.json

      - name: Core release gate audit dry run
        run: python ./scripts/core_release_gate_audit_d1l.py --dry-run --commit ${{ github.sha }} --github-run-id ${{ github.run_id }} --sd-history-mode disabled --out artifacts/release-gate/core-release-gate-audit-ci.json

      - name: Record exact host-check success evidence
        shell: pwsh
        run: |
          $out = Join-Path "artifacts" "host-checks"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $payload = [ordered]@{
            schema = 1
            artifact_type = "d1l_host_checks_success"
            status = "pass"
            passed = $true
            all_prior_steps_completed = $true
            job = "host-checks"
            repository_commit = $env:GITHUB_SHA
            workflow_run_id = [string]$env:GITHUB_RUN_ID
            workflow_run_attempt = [string]$env:GITHUB_RUN_ATTEMPT
          }
          $path = Join-Path $out ("d1l_host_checks_success_{0}.json" -f $env:GITHUB_SHA)
          $payload | ConvertTo-Json | Set-Content -LiteralPath $path -Encoding utf8NoBOM

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: d1l-host-artifacts
          path: artifacts/**
          if-no-files-found: error
          retention-days: 14

  meshcore-conformance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install pinned Clang sanitizer toolchain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/meshcore-conformance
          clang_package="$RUNNER_TEMP/clang-18_18.1.3-1ubuntu1_amd64.deb"
          curl --fail --location --proto '=https' \
            'https://archive.ubuntu.com/ubuntu/pool/universe/l/llvm-toolchain-18/clang-18_18.1.3-1ubuntu1_amd64.deb' \
            --output "$clang_package"
          test "$(stat -c '%s' "$clang_package")" = "80040"
          printf '%s  %s\n' \
            '628b16701014ef7ad648380b20ea74b90dd543857f933b3e34d2fc042783de25' \
            "$clang_package" | sha256sum --check --strict
          sudo apt-get update
          sudo apt-get install -y "$clang_package"
          python scripts/verify_ci_tool_inputs.py \
            --root . \
            --clang-package "$clang_package" \
            --cc "$(command -v clang-18)" \
            --cxx "$(command -v clang++-18)" \
            --out artifacts/meshcore-conformance/toolchain-inputs.json

      - name: Validate Ed25519 defined-arithmetic overlay
        shell: bash
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          python ./scripts/validate_ed25519_defined_overlay.py \
            --cc clang-18 \
            --sanitizers required \
            --out "artifacts/meshcore-conformance/ed25519_defined_overlay_${GITHUB_SHA}.json"

      - name: Run pinned MeshCore signed-advert semantic runtime
        shell: bash
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          python ./scripts/meshcore_signed_advert_runtime_d1l.py \
            --cc clang-18 \
            --cxx clang++-18 \
            --commit "$GITHUB_SHA" \
            --sanitize \
            --out "artifacts/meshcore-conformance/meshcore_signed_advert_runtime_${GITHUB_SHA}.json"

      - name: Run production USB command parser fuzz gate
        shell: bash
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          python ./scripts/usb_command_parser_fuzz_d1l.py \
            --cc clang-18 \
            --commit "$GITHUB_SHA" \
            --seed 13746277 \
            --runs 100000 \
            --out "artifacts/meshcore-conformance/usb_command_parser_fuzz_${GITHUB_SHA}.json"

      - name: Run production MeshCore semantic packet parser fuzz gate
        shell: bash
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          python ./scripts/meshcore_semantic_packet_fuzz_d1l.py \
            --cc clang-18 \
            --commit "$GITHUB_SHA" \
            --seed 13746277 \
            --runs 100000 \
            --out "artifacts/meshcore-conformance/meshcore_semantic_packet_fuzz_${GITHUB_SHA}.json"

      - name: Run remaining production WP-05 fuzz targets
        shell: bash
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          python ./scripts/meshcore_remaining_fuzz_d1l.py \
            --cc clang-18 \
            --cxx clang++-18 \
            --commit "$GITHUB_SHA" \
            --seed 13746277 \
            --runs 100000 \
            --out "artifacts/meshcore-conformance/meshcore_remaining_fuzz_${GITHUB_SHA}.json"

      - name: Run MeshCore wire-envelope conformance and RX fuzzing
        shell: bash
        env:
          D1L_MESHCORE_CONFORMANCE_CI: "1"
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          mkdir -p artifacts/meshcore-conformance
          python ./scripts/meshcore_conformance_d1l.py \
            --cc clang-18 \
            --cxx clang++-18 \
            --commit "$GITHUB_SHA" \
            --toolchain-receipt artifacts/meshcore-conformance/toolchain-inputs.json \
            --signed-advert-runtime-receipt "artifacts/meshcore-conformance/meshcore_signed_advert_runtime_${GITHUB_SHA}.json" \
            --seed 13746277 \
            --runs 100000 \
            --out "artifacts/meshcore-conformance/meshcore_conformance_${GITHUB_SHA}.json"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() }}
        with:
          name: d1l-meshcore-wire-conformance
          path: artifacts/meshcore-conformance/**
          if-no-files-found: error
          retention-days: 14

  rp2040-sd-bridge-build:
    needs: change-filter
    if: needs.change-filter.outputs.include_sd_bridge == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: arduino/setup-arduino-cli@81d310742121c928ea9c8bbd407b4217b432ae02 # v2.0.0
        with:
          version: "1.5.0"

      - name: Install RP2040 Arduino core
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-sd-bridge
          arduino-cli config add board_manager.additional_urls https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index
          arduino-cli core download rp2040:rp2040@5.6.1
          arduino_cli_version="$(arduino-cli version | sed -n 's/^arduino-cli[[:space:]]\+Version:[[:space:]]\+\([^[:space:]]\+\).*$/\1/p')"
          test -n "$arduino_cli_version"
          python scripts/verify_arduino_build_inputs.py \
            --root . \
            --arduino-data-dir "$HOME/.arduino15" \
            --arduino-cli-version "$arduino_cli_version" \
            --arduino-cli-path "$(command -v arduino-cli)" \
            --out artifacts/rp2040-sd-bridge/build-inputs.json
          arduino-cli core install rp2040:rp2040@5.6.1

      - name: Disable unused SdFat PIO SDIO serial debug
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-sd-bridge
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          source = (
              Path.home()
              / ".arduino15/packages/rp2040/hardware/rp2040/5.6.1"
              / "libraries/SdFat/src/SdCard/PioSdio/PioSdioCard.cpp"
          )
          before = source.read_bytes()
          old = b"#define USE_DEBUG_MODE 1"
          new = b"#define USE_DEBUG_MODE 0"
          if before.count(old) != 1 or before.count(new) != 0:
              raise SystemExit(
                  "pinned SdFat PioSdio debug marker mismatch; refusing dependency patch"
              )
          after = before.replace(old, new)
          source.write_bytes(after)
          verified = source.read_bytes()
          if verified != after or verified.count(old) != 0 or verified.count(new) != 1:
              raise SystemExit("SdFat PioSdio no-serial patch verification failed")
          receipt = {
              "schema": 1,
              "kind": "arduino_pico_sdfat_no_usb_patch",
              "arduino_pico_version": "5.6.1",
              "upstream_sdfat_commit": "cda057318bec196183d4cc92b01bc1dd64bbfb02",
              "source": "libraries/SdFat/src/SdCard/PioSdio/PioSdioCard.cpp",
              "change": "USE_DEBUG_MODE=1 -> USE_DEBUG_MODE=0",
              "reason": "production_no_usb_build_has_no_Serial_and_bridge_uses_SPI1_not_PIO_SDIO",
              "before_sha256": hashlib.sha256(before).hexdigest(),
              "after_sha256": hashlib.sha256(after).hexdigest(),
          }
          Path("artifacts/rp2040-sd-bridge/sdfat-no-usb-patch.json").write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="ascii"
          )
          PY

      - name: Build RP2040 SD bridge
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-sd-bridge
          arduino-cli compile \
            --fqbn rp2040:rp2040:seeed_indicator_rp2040:usbstack=nousb \
            --build-property compiler.cpp.extra_flags="-DUSE_SD_CRC=1" \
            --output-dir artifacts/rp2040-sd-bridge \
            firmware/rp2040_sd_bridge/deskos_sd_bridge
          (cd artifacts/rp2040-sd-bridge && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Verify RP2040 checksums
        run: python ./scripts/verify_checksums.py artifacts/rp2040-sd-bridge

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rp2040-sd-bridge-firmware
          path: artifacts/rp2040-sd-bridge/**
          if-no-files-found: error
          retention-days: 14

      - name: Build RP2040 Seeed SD smoke
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-sd-smoke
          arduino-cli compile \
            --fqbn rp2040:rp2040:seeed_indicator_rp2040 \
            --build-property compiler.cpp.extra_flags="-DUSE_SD_CRC=1" \
            --output-dir artifacts/rp2040-sd-smoke \
            firmware/rp2040_sd_smoke/seeed_sd_smoke
          (cd artifacts/rp2040-sd-smoke && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Verify RP2040 Seeed SD smoke checksums
        run: python ./scripts/verify_checksums.py artifacts/rp2040-sd-smoke

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rp2040-sd-smoke-firmware
          path: artifacts/rp2040-sd-smoke/**
          if-no-files-found: error
          retention-days: 14

      - name: Build RP2040 official Seeed SD smoke
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-seeed-official-sd-smoke
          arduino-cli compile \
            --fqbn rp2040:rp2040:seeed_indicator_rp2040 \
            --build-property compiler.cpp.extra_flags="-DUSE_SD_CRC=1" \
            --output-dir artifacts/rp2040-seeed-official-sd-smoke \
            firmware/rp2040_sd_bridge/smoke/seeed_official_sd_smoke
          (cd artifacts/rp2040-seeed-official-sd-smoke && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Verify RP2040 official Seeed SD smoke checksums
        run: python ./scripts/verify_checksums.py artifacts/rp2040-seeed-official-sd-smoke

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rp2040-seeed-official-sd-smoke-firmware
          path: artifacts/rp2040-seeed-official-sd-smoke/**
          if-no-files-found: error
          retention-days: 14

  firmware-build:
    needs: [change-filter, host-checks, meshcore-conformance, rp2040-sd-bridge-build]
    if: ${{ always() && needs.change-filter.result == 'success' && needs.host-checks.result == 'success' && needs.meshcore-conformance.result == 'success' && (needs.rp2040-sd-bridge-build.result == 'success' || needs.rp2040-sd-bridge-build.result == 'skipped') }}
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.4@sha256:b9f2d6ea1c19e0c9f7959bdb74a9e3c775642f9d0f3b841937c5fa3363db892b
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Download exact MeshCore conformance evidence
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: d1l-meshcore-wire-conformance
          path: artifacts/meshcore-conformance-input

      - name: Verify exact MeshCore conformance evidence
        shell: bash
        run: |
          mapfile -t conformance_files < <(
            find artifacts/meshcore-conformance-input -type f \
              -name "meshcore_conformance_${GITHUB_SHA}.json" -print
          )
          if [[ "${#conformance_files[@]}" -ne 1 ]]; then
            printf 'Expected exactly one current-commit conformance JSON, found %s\n' \
              "${#conformance_files[@]}" >&2
            exit 1
          fi
          conformance_json="${conformance_files[0]}"
          mapfile -t signed_runtime_files < <(
            find artifacts/meshcore-conformance-input -type f \
              -name "meshcore_signed_advert_runtime_${GITHUB_SHA}.json" -print
          )
          if [[ "${#signed_runtime_files[@]}" -ne 1 ]]; then
            printf 'Expected exactly one current-commit signed-advert runtime JSON, found %s\n' \
              "${#signed_runtime_files[@]}" >&2
            exit 1
          fi
          signed_runtime_json="${signed_runtime_files[0]}"
          python - "$conformance_json" "$signed_runtime_json" <<'PY'
          import json
          import os
          import sys

          from scripts.meshcore_conformance_d1l import validate_completed_report
          from scripts.meshcore_signed_advert_runtime_d1l import (
              validate_completed_report as validate_signed_runtime,
          )

          with open(sys.argv[1], encoding="utf-8") as stream:
              report = json.load(stream)
          with open(sys.argv[2], encoding="utf-8") as stream:
              signed_runtime = json.load(stream)
          validate_signed_runtime(signed_runtime, os.environ["GITHUB_SHA"])
          validate_completed_report(
              report,
              os.environ["GITHUB_SHA"],
              signed_advert_runtime_receipt=signed_runtime,
          )
          PY
          printf 'D1L_MESHCORE_CONFORMANCE_JSON=%s\n' "$conformance_json" >> "$GITHUB_ENV"
          printf 'D1L_MESHCORE_SIGNED_ADVERT_RUNTIME_JSON=%s\n' "$signed_runtime_json" >> "$GITHUB_ENV"

      - name: Build D1L firmware
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . /opt/esp/idf/export.sh
          idf.py build

      - name: Capture ESP-IDF migration state
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p artifacts/idf-migration
          printf '%s\n' 'espressif/idf:v5.5.4@sha256:b9f2d6ea1c19e0c9f7959bdb74a9e3c775642f9d0f3b841937c5fa3363db892b' > artifacts/idf-migration/container-image.txt
          cp .github/d1l-build-inputs.json artifacts/idf-migration/build-inputs.json
          (. /opt/esp/idf/export.sh >/dev/null 2>&1 && idf.py --version) \
            > artifacts/idf-migration/idf-version.txt 2>&1 || : > artifacts/idf-migration/idf-version.txt
          git -C /opt/esp/idf rev-parse HEAD \
            > artifacts/idf-migration/idf-git-sha.txt 2>&1 || true
          git diff -- dependencies.lock \
            > artifacts/idf-migration/dependencies.lock.patch
          git status --short --ignored -- dependencies.lock sdkconfig sdkconfig.defaults \
            > artifacts/idf-migration/config-status.txt
          for src in dependencies.lock sdkconfig build/config/sdkconfig.json; do
            if [[ -f "$src" ]]; then
              cp "$src" "artifacts/idf-migration/$(basename "$src")"
            fi
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() }}
        with:
          name: d1l-idf55-migration-state
          path: artifacts/idf-migration/**
          if-no-files-found: error
          retention-days: 14

      - name: Require committed dependency solution
        shell: bash
        run: git diff --exit-code -- dependencies.lock

      - name: Collect firmware artifacts
        shell: bash
        run: |
          mkdir -p artifacts/firmware
          find build -type f \( -name "*.bin" -o -name "*.elf" -o -name "*.map" -o -name "flasher_args.json" \) -print -exec cp --parents {} artifacts/firmware/ \;
          test -f sdkconfig
          test -f build/config/sdkconfig.json
          cp --parents sdkconfig build/config/sdkconfig.json artifacts/firmware/
          (cd artifacts/firmware && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Download RP2040 release artifacts
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: rp2040-*-firmware
          path: artifacts/rp2040-release-inputs
          merge-multiple: false

      - name: Package D1L release
        shell: bash
        run: |
          package_args=(--build-dir build --out-dir artifacts/release --package-name "d1l-release-${GITHUB_SHA}" --release-profile core_1_0 --sd-history-mode disabled --meshcore-conformance-json "$D1L_MESHCORE_CONFORMANCE_JSON" --meshcore-signed-advert-runtime-json "$D1L_MESHCORE_SIGNED_ADVERT_RUNTIME_JSON")
          if [[ "${{ needs.change-filter.outputs.include_sd_bridge }}" == "true" ]]; then
            package_args+=(--rp2040-artifact-root artifacts/rp2040-release-inputs)
          fi
          python scripts/package_release_d1l.py "${package_args[@]}"

      - name: Verify firmware and release checksums
        run: |
          python scripts/verify_checksums.py artifacts/firmware
          python scripts/verify_checksums.py "artifacts/release/d1l-release-${GITHUB_SHA}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: d1l-firmware-artifacts
          path: artifacts/firmware/**
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: d1l-release-package
          path: artifacts/release/**
          if-no-files-found: error
          retention-days: 14
