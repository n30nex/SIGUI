name: d1l-ci

on:
  workflow_dispatch:
    inputs:
      include_sd_bridge:
        description: "Build RP2040 SD bridge artifacts and run SD bridge host dry-runs"
        required: false
        type: boolean
        default: false
  push:
  pull_request:

jobs:
  change-filter:
    runs-on: ubuntu-latest
    outputs:
      include_sd_bridge: ${{ steps.scope.outputs.include_sd_bridge }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide SD bridge scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          include_sd_bridge=false
          reason=esp32_only

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_sd_bridge }}" == "true" ]]; then
            include_sd_bridge=true
            reason=manual_dispatch
          else
            : > changed-files.txt
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}" || true
              git fetch --no-tags --prune --depth=1 origin "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" || true
              git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt \
                || git diff --name-only "origin/${{ github.base_ref }}"...HEAD > changed-files.txt \
                || true
            elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt \
                || git diff --name-only HEAD~1 HEAD > changed-files.txt \
                || true
            else
              git diff --name-only HEAD~1 HEAD > changed-files.txt || git ls-files > changed-files.txt
            fi

            if grep -E '^(firmware/rp2040_sd_bridge/|firmware/rp2040_sd_smoke/|tools/rp2040_sd_protocol.py|scripts/(rp2040_|sd_).*_d1l.py|scripts/flash_rp2040_sd_bridge_uf2.py|tests/test_rp2040_sd_bridge_target.py|tests/test_storage_status_contract.py|docs/(SD_BRIDGE_PROTOCOL_D1L|RP2040_SD_BRIDGE_FLASH_D1L|D1L_SD_CARD_GUIDED_INSTALL)\.md)' changed-files.txt >/dev/null; then
              include_sd_bridge=true
              reason=sd_bridge_paths
            fi
          fi

          echo "include_sd_bridge=${include_sd_bridge}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "include_sd_bridge=${include_sd_bridge} (${reason})"

  host-checks:
    needs: change-filter
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        run: python -m pip install --upgrade pip pytest pyserial Pillow

      - name: Host tests
        run: python -m pytest tests -q

      - name: Validate completion ledger
        run: python ./scripts/completion_ledger.py validate --check-generated

      - name: Smoke dry run
        run: python ./scripts/smoke_d1l.py --dry-run

      - name: UI corruption probe dry run
        run: python ./scripts/ui_corruption_probe_d1l.py --dry-run --rounds 20

      - name: UI scroll probe dry run
        run: python ./scripts/scroll_probe_d1l.py --dry-run --screens home,public_messages,dm_thread,nodes,packets,settings,storage,storage_card,storage_data,wifi,map,map_options,map_location,map_cache

      - name: Soak dry run
        run: python ./scripts/soak_d1l.py --dry-run --duration-sec 60 --sample-interval-sec 15 --active-public-text test

      - name: SD file canary dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_file_canary_d1l.py --dry-run

      - name: SD retained history acceptance dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_retained_history_acceptance_d1l.py --dry-run --token ci-dry-run

      - name: SD map tile canary dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_map_tile_canary_d1l.py --dry-run --token ci-dry-run

      - name: SD reboot remount acceptance dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_reboot_remount_acceptance_d1l.py --dry-run --token ci-dry-run

      - name: SD export canary dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_export_canary_d1l.py --dry-run --token ci-dry-run

      - name: SD diagnostic export dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_diagnostic_export_d1l.py --dry-run --token ci-dry-run

      - name: SD data export dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_data_export_d1l.py --dry-run --token ci-dry-run

      - name: RP2040 SD bridge preflight dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/rp2040_sd_bridge_preflight_d1l.py --dry-run --artifact-dir artifacts/rp2040-sd-bridge

      - name: SD boot prepare acceptance dry run
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        run: python ./scripts/sd_boot_prepare_acceptance_d1l.py --dry-run --scenario all

      - name: RF full acceptance dry run
        run: python ./scripts/rf_full_acceptance_d1l.py --dry-run --commit ci-dry-run

      - name: UI simulator screenshots
        run: |
          python ./tools/ui_simulator.py --out artifacts/ui-sim
          python ./tools/ui_simulator.py --scenario large-mesh --out artifacts/ui-sim-large
          python ./tools/ui_simulator.py --scenario storage-states --out artifacts/ui-sim-storage
          python ./tools/ui_simulator.py --scenario map-ready --view map --view map_options --view map_location --view map_cache --out artifacts/ui-sim-map-ready

      - name: Checksum contract tests
        run: python -m pytest -q tests/test_checksum_manifest.py tests/test_package_release_d1l.py

      - name: Release gate audit dry run
        run: python ./scripts/release_gate_audit_d1l.py --out artifacts/release-gate/d1l-release-gate-audit-ci.json

      - name: Record exact host-check success evidence
        shell: pwsh
        run: |
          $out = Join-Path "artifacts" "host-checks"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $payload = [ordered]@{
            schema = 1
            artifact_type = "d1l_host_checks_success"
            status = "pass"
            passed = $true
            all_prior_steps_completed = $true
            job = "host-checks"
            repository_commit = $env:GITHUB_SHA
            workflow_run_id = [string]$env:GITHUB_RUN_ID
            workflow_run_attempt = [string]$env:GITHUB_RUN_ATTEMPT
          }
          $path = Join-Path $out ("d1l_host_checks_success_{0}.json" -f $env:GITHUB_SHA)
          $payload | ConvertTo-Json | Set-Content -LiteralPath $path -Encoding utf8NoBOM

      - uses: actions/upload-artifact@v7
        with:
          name: d1l-host-artifacts
          path: artifacts/**
          if-no-files-found: error
          retention-days: 14

  meshcore-conformance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pinned Clang sanitizer toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-18
          clang-18 --version | grep -E '^Ubuntu clang version 18\.'
          clang++-18 --version | grep -E '^Ubuntu clang version 18\.'

      - name: Run MeshCore wire-envelope conformance and RX fuzzing
        shell: bash
        env:
          D1L_MESHCORE_CONFORMANCE_CI: "1"
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -euo pipefail
          mkdir -p artifacts/meshcore-conformance
          python ./scripts/meshcore_conformance_d1l.py \
            --cc clang-18 \
            --cxx clang++-18 \
            --commit "$GITHUB_SHA" \
            --seed 13746277 \
            --runs 100000 \
            --out "artifacts/meshcore-conformance/meshcore_conformance_${GITHUB_SHA}.json"

      - uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: d1l-meshcore-wire-conformance
          path: artifacts/meshcore-conformance/**
          if-no-files-found: error
          retention-days: 14

  rp2040-sd-bridge-build:
    needs: change-filter
    if: needs.change-filter.outputs.include_sd_bridge == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: arduino/setup-arduino-cli@v2
        with:
          version: 1.x

      - name: Install RP2040 Arduino core
        shell: bash
        run: |
          arduino-cli config add board_manager.additional_urls https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index
          arduino-cli core install rp2040:rp2040

      - name: Build RP2040 SD bridge
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-sd-bridge
          arduino-cli compile \
            --fqbn rp2040:rp2040:seeed_indicator_rp2040 \
            --build-property compiler.cpp.extra_flags="-DUSE_SD_CRC=1" \
            --output-dir artifacts/rp2040-sd-bridge \
            firmware/rp2040_sd_bridge/deskos_sd_bridge
          (cd artifacts/rp2040-sd-bridge && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Verify RP2040 checksums
        run: python ./scripts/verify_checksums.py artifacts/rp2040-sd-bridge

      - uses: actions/upload-artifact@v7
        with:
          name: rp2040-sd-bridge-firmware
          path: artifacts/rp2040-sd-bridge/**
          if-no-files-found: error
          retention-days: 14

      - name: Build RP2040 Seeed SD smoke
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-sd-smoke
          arduino-cli compile \
            --fqbn rp2040:rp2040:seeed_indicator_rp2040 \
            --build-property compiler.cpp.extra_flags="-DUSE_SD_CRC=1" \
            --output-dir artifacts/rp2040-sd-smoke \
            firmware/rp2040_sd_smoke/seeed_sd_smoke
          (cd artifacts/rp2040-sd-smoke && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Verify RP2040 Seeed SD smoke checksums
        run: python ./scripts/verify_checksums.py artifacts/rp2040-sd-smoke

      - uses: actions/upload-artifact@v7
        with:
          name: rp2040-sd-smoke-firmware
          path: artifacts/rp2040-sd-smoke/**
          if-no-files-found: error
          retention-days: 14

      - name: Build RP2040 official Seeed SD smoke
        shell: bash
        run: |
          mkdir -p artifacts/rp2040-seeed-official-sd-smoke
          arduino-cli compile \
            --fqbn rp2040:rp2040:seeed_indicator_rp2040 \
            --build-property compiler.cpp.extra_flags="-DUSE_SD_CRC=1" \
            --output-dir artifacts/rp2040-seeed-official-sd-smoke \
            firmware/rp2040_sd_bridge/smoke/seeed_official_sd_smoke
          (cd artifacts/rp2040-seeed-official-sd-smoke && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Verify RP2040 official Seeed SD smoke checksums
        run: python ./scripts/verify_checksums.py artifacts/rp2040-seeed-official-sd-smoke

      - uses: actions/upload-artifact@v7
        with:
          name: rp2040-seeed-official-sd-smoke-firmware
          path: artifacts/rp2040-seeed-official-sd-smoke/**
          if-no-files-found: error
          retention-days: 14

  firmware-build:
    needs: [change-filter, host-checks, meshcore-conformance, rp2040-sd-bridge-build]
    if: ${{ always() && needs.change-filter.result == 'success' && needs.host-checks.result == 'success' && needs.meshcore-conformance.result == 'success' && (needs.rp2040-sd-bridge-build.result == 'success' || needs.rp2040-sd-bridge-build.result == 'skipped') }}
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.4
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download exact MeshCore conformance evidence
        uses: actions/download-artifact@v7
        with:
          name: d1l-meshcore-wire-conformance
          path: artifacts/meshcore-conformance-input

      - name: Verify exact MeshCore conformance evidence
        shell: bash
        run: |
          mapfile -t conformance_files < <(
            find artifacts/meshcore-conformance-input -type f \
              -name "meshcore_conformance_${GITHUB_SHA}.json" -print
          )
          if [[ "${#conformance_files[@]}" -ne 1 ]]; then
            printf 'Expected exactly one current-commit conformance JSON, found %s\n' \
              "${#conformance_files[@]}" >&2
            exit 1
          fi
          conformance_json="${conformance_files[0]}"
          python - "$conformance_json" <<'PY'
          import json
          import os
          import sys

          path = sys.argv[1]
          with open(path, encoding="utf-8") as stream:
              report = json.load(stream)
          source = report.get("source_verification") or {}
          required = {
              "schema_version": report.get("schema_version") == 1,
              "artifact_type": report.get("artifact_type") == "d1l_meshcore_wire_conformance",
              "passed": report.get("passed") is True,
              "status": report.get("status") == "pass",
              "execution_complete": report.get("execution_complete") is True,
              "repository_commit": source.get("repository_commit") == os.environ["GITHUB_SHA"],
              "coverage_boundary": report.get("coverage_boundary") == "wire_envelope_only",
              "coverage_level": report.get("coverage_level") == "wire_envelope_only",
              "closure_ready_false": report.get("closure_ready") is False,
              "issue_65_closure_eligible_false": report.get("issue_65_closure_eligible") is False,
          }
          failed = [name for name, ok in required.items() if not ok]
          if failed:
              raise SystemExit("MeshCore conformance validation failed: " + ", ".join(failed))
          PY
          printf 'D1L_MESHCORE_CONFORMANCE_JSON=%s\n' "$conformance_json" >> "$GITHUB_ENV"

      - name: Build D1L firmware
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . /opt/esp/idf/export.sh
          idf.py build

      - name: Capture ESP-IDF migration state
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p artifacts/idf-migration
          printf '%s\n' 'espressif/idf:v5.5.4' > artifacts/idf-migration/container-image.txt
          (. /opt/esp/idf/export.sh >/dev/null && idf.py --version) \
            > artifacts/idf-migration/idf-version.txt 2>&1 || true
          git -C /opt/esp/idf rev-parse HEAD \
            > artifacts/idf-migration/idf-git-sha.txt 2>&1 || true
          git diff -- dependencies.lock \
            > artifacts/idf-migration/dependencies.lock.patch
          git status --short --ignored -- dependencies.lock sdkconfig sdkconfig.defaults \
            > artifacts/idf-migration/config-status.txt
          for src in dependencies.lock sdkconfig build/config/sdkconfig.json; do
            if [[ -f "$src" ]]; then
              cp "$src" "artifacts/idf-migration/$(basename "$src")"
            fi
          done

      - uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: d1l-idf55-migration-state
          path: artifacts/idf-migration/**
          if-no-files-found: error
          retention-days: 14

      - name: Require committed dependency solution
        shell: bash
        run: git diff --exit-code -- dependencies.lock

      - name: Collect firmware artifacts
        shell: bash
        run: |
          mkdir -p artifacts/firmware
          find build -type f \( -name "*.bin" -o -name "*.elf" -o -name "*.map" -o -name "flasher_args.json" \) -print -exec cp --parents {} artifacts/firmware/ \;
          test -f sdkconfig
          test -f build/config/sdkconfig.json
          cp --parents sdkconfig build/config/sdkconfig.json artifacts/firmware/
          (cd artifacts/firmware && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Download RP2040 release artifacts
        if: needs.change-filter.outputs.include_sd_bridge == 'true'
        uses: actions/download-artifact@v7
        with:
          pattern: rp2040-*-firmware
          path: artifacts/rp2040-release-inputs
          merge-multiple: false

      - name: Package D1L release
        shell: bash
        run: |
          package_args=(--build-dir build --out-dir artifacts/release --package-name "d1l-release-${GITHUB_SHA}" --meshcore-conformance-json "$D1L_MESHCORE_CONFORMANCE_JSON")
          if [[ "${{ needs.change-filter.outputs.include_sd_bridge }}" == "true" ]]; then
            package_args+=(--rp2040-artifact-root artifacts/rp2040-release-inputs)
          fi
          python scripts/package_release_d1l.py "${package_args[@]}"

      - name: Verify firmware and release checksums
        run: |
          python scripts/verify_checksums.py artifacts/firmware
          python scripts/verify_checksums.py "artifacts/release/d1l-release-${GITHUB_SHA}"

      - uses: actions/upload-artifact@v7
        with:
          name: d1l-firmware-artifacts
          path: artifacts/firmware/**
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: d1l-release-package
          path: artifacts/release/**
          if-no-files-found: error
          retention-days: 14
