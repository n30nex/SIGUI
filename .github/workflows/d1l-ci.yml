name: d1l-ci

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  host-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        run: python -m pip install --upgrade pip pytest pyserial esptool Pillow

      - name: Host build path
        run: pwsh ./scripts/build_d1l.ps1

      - name: Smoke dry run
        run: python ./scripts/smoke_d1l.py --dry-run

      - name: UI simulator screenshots
        run: python ./tools/ui_simulator.py --out artifacts/ui-sim

      - name: Verify checksums
        run: python ./scripts/verify_checksums.py artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: d1l-host-artifacts
          path: artifacts/**
          if-no-files-found: error
          retention-days: 14

  firmware-build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build D1L firmware
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . /opt/esp/idf/export.sh
          idf.py build

      - name: Collect firmware artifacts
        shell: bash
        run: |
          mkdir -p artifacts/firmware
          find build -type f \( -name "*.bin" -o -name "*.elf" -o -name "*.map" -o -name "flasher_args.json" \) -print -exec cp --parents {} artifacts/firmware/ \;
          (cd artifacts/firmware && find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)

      - name: Package D1L release
        shell: bash
        run: |
          python scripts/package_release_d1l.py --build-dir build --out-dir artifacts/release --package-name "d1l-release-${GITHUB_SHA}"

      - uses: actions/upload-artifact@v7
        with:
          name: d1l-firmware-artifacts
          path: artifacts/firmware/**
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: d1l-release-package
          path: artifacts/release/**
          if-no-files-found: error
          retention-days: 14
