mission:
  stable_core: Ship a truthful, durable, non-forwarding standalone MeshCore desk client.
  full_feature: Continue through BLE, terminal, notifications/emoji, and signed update/recovery.
  stop_condition: All applicable full-feature gates green on one exact tagged commit.
constraints:
- Firmware builds only in GitHub Actions.
- Flash only checksum-verified Actions artifacts.
- Never use COM8, COM11, or COM29.
- Require explicit D1L_PORT, RP2040_PORT, and MESH_PEER_PORT.
- Never format SD on-device; user prepares FAT32 media.
- 'No Public RF outside approved #test use; targeted DMs only for normal RF proof.'
- Minimize hardware/RF retests to issue-specific gates.
- D1L remains a non-forwarding client.
- 'Canada/USA default radio profile: 910.525 MHz, BW 62.5 kHz, SF7, CR5, 20 dBm, TCXO NONE.'
- Message input maximum 138 UTF-8 bytes unless pinned upstream proves lower.
- Hide or label unavailable features; no no-op controls.
- Preserve identity, settings, retained history, and SD data.
- Evidence must match exact source SHA, run, artifact checksum, ports, and peer.
