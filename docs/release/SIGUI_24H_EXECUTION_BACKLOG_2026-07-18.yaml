  - candidate source frozen
  hard_blocker: true
- id: R10
  title: Frozen candidate GitHub Actions
  owner: lead
  elapsed_window: H5.0-H7.0
  depends_on:
  - R9
  outputs:
  - green d1l-ci run
  - downloaded artifacts
  - verified checksums
  - provenance
  - SBOM
  acceptance:
  - exact SHA/run/package binding
  - no changed dependency lock
  hard_blocker: true
- id: R11
  title: Exact flash and physical core UI/boot/persistence
  owner: lead
  elapsed_window: H7.0-H9.0
  depends_on:
  - R10
  outputs:
  - flash receipt
  - core smoke receipt
  - UI receipts
  - reboot/cold-boot receipt
  acceptance:
  - COM12 exact SHA
  - display/touch green
  - 20 UI rounds
  - 5 software reboots
  - 3 cold boots
  - retained state intact
  hard_blocker: true
- id: R12
  title: Controlled RF/DM acceptance
  owner: lead
  elapsed_window: H9.0-H10.5
  depends_on:
  - R11
  outputs:
  - rf_full_acceptance exact receipt
  acceptance:
  - outbound DM
  - inbound DM
  - ACK/PATH
  - direct route
  - retained thread
  - health ready
  - public_rf_tx false
  hard_blocker: true
- id: R13
  title: Conditional SD decision
  owner: lead
  elapsed_window: H10.5-H12.0
  depends_on:
  - R11
  outputs:
  - sd supported_optional receipt or disabled decision
  acceptance:
  - supported only after paired artifact/card/remount/remove/reinsert/canary proof
  - otherwise hidden and disabled
  fallback: disable SD, omit RP2040 package, use NVS
  hard_blocker: false
- id: R14
  title: Core 90-minute soak
  owner: lead
  elapsed_window: H12.0-H14.0
  depends_on:
  - R12
  - R13
  outputs:
  - 60m active receipt
  - 30m idle receipt
  acceptance:
