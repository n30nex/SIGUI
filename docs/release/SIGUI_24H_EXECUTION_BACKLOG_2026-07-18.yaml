  - focused tests
  - one new full suite
  - one new Actions candidate
  - affected hardware gate plus 90m soak rerun for runtime changes
  hard_blocker: false
- id: R16
  title: Final Core audit, tag, and release
  owner: lead
  elapsed_window: H20.0-H23.0
  depends_on:
  - R10
  - R11
  - R12
  - R14
  outputs:
  - core audit
  - release package
  - v1.0.0 tag
  - GitHub release
  - hashes and release notes
  acceptance:
  - core_release_ready true
  - full_feature_release_ready false
  - zero core P0
  - zero core crash/data-loss/security P1
  hard_blocker: true
hard_no_go:
- stale_or_predecessor_hardware_evidence
- candidate_sha_mismatch
- checksum_or_provenance_failure
- actions_failure
- unexpected_reset_or_boot_loop
- retained_data_loss
- dm_interop_failure
- unsupported_feature_reachable
- heap_or_stack_failure
- sd_claim_without_sd_gate
- missing_usb_recovery
- forbidden_port_use
- on_device_sd_format
- edited_or_fabricated_evidence
