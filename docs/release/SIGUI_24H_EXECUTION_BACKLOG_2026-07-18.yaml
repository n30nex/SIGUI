  hard_blocker: true
- id: R8
  title: Independent review
  owner: agent_f
  elapsed_window: H2.0-H4.0
  depends_on:
  - R1
  - R2
  - R3
  - R4
  - R5
  - R6
  - R7
  outputs:
  - review report
  - port-policy review
  - hardware command sheet
  acceptance:
  - no fabricated evidence
  - no forbidden port
  - no SD format
  hard_blocker: true
- id: R9
  title: Integration and one full host suite
  owner: lead
  elapsed_window: H3.0-H5.0
  depends_on:
  - R1
  - R2
  - R3
  - R4
  - R5
  - R6
  - R7
  - R8
  outputs:
  - single integration commit
  - full host test report
  - clean diff
  tests:
  - all focused suites
  - python -m pytest tests -q
