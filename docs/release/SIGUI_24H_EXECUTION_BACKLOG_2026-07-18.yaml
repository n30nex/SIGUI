  - UI/package truth
  - NVS fallback
  tests:
  - SD supported/disabled profile cases
  - no-format policy
  acceptance:
  - SD can be disabled without core failure
  - no partial claim
  hard_blocker: true
- id: R6
  title: Core DM and contact-path review/fixes
  owner: agent_c
  elapsed_window: H0.5-H3.0
  depends_on:
  - R0
  outputs:
  - focused DM test report
  - small fixes only if failures proven
  tests:
  - ACK/retry/failure state
  - duplicate/replay
  - contact-to-DM
  - route/PATH authority
  acceptance:
  - no known core software P0
  - runner ready for controlled peer
  hard_blocker: true
- id: R7
  title: Core smoke, package, and release audit
  owner: agent_e
  elapsed_window: H0.5-H3.5
  depends_on:
  - R1
  - R2
  - R3
  - R5
  outputs:
  - scripts/core_smoke_d1l.py
  - scripts/core_ui_corruption_probe_d1l.py
  - scripts/core_release_gate_audit_d1l.py
  - profile-bound package manifest
  - SUPPORTED_FEATURES.md
  tests:
  - core smoke contract
  - core UI tab sequence excludes Map and unavailable destinations
  - core audit pass/fail fixtures
  - package capability truth
  - full default audit unchanged
  acceptance:
