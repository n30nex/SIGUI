schema_version: 1
generated_at: '2026-07-18'
repository: n30nex/SIGUI
starting_main_observed: 846f728dd3faded85451c6d39ba6a07cb8ca7f44
code_baseline_observed: bd6ea0e685442d8a820766f4686395e50ca5397f
release:
  name: MeshCore DeskOS D1L Core 1.0
  tag: v1.0.0
  profile: core_1_0
  hard_elapsed_hour_cap: 24
  target_branch: release/24h-core
  full_feature_release_ready_expected: false
constraints:
  actions_only_firmware_build: true
  d1l_port: COM12
  rp2040_port_when_sd_only: COM16
  forbidden_ports:
  - COM8
  - COM11
  - COM29
  format_sd: false
  erase_settings_for_normal_flash: false
  automated_default_public_rf: false
  single_integration_pr: true
  one_owner_per_hotspot: true
  predecessor_hardware_evidence_closes_candidate: false
supported_capabilities:
- board_display_touch_backlight
- home_core_navigation
- default_public_messages
- direct_messages
- basic_verified_contacts
- nodes
- packets
- read_only_route_signal
- usa_canada_radio_profile
- identity_signed_adverts
- retained_nvs
- diagnostics_crashlog_health
- usb_install_recovery
- fixed_utc_offset_truth
conditional_capabilities:
  sd_history:
    default: conditional
    pass_value: supported_optional
    failure_value: disabled
unavailable_capabilities:
- map
- wifi_user_control
- ble
- multi_channel_management
- repeater_room_admin
- observer_mqtt
- signed_sd_update_ota
- gps_location
- mutable_terminal
- advanced_qr_emoji
- user_trace_path
agents:
  lead:
    role: integrator_release_owner
    owns:
    - release/24h-core
    - main/app/release_profile.c
    - main/app/release_profile.h
    - candidate_freeze
    - final_actions_run
    - release_decision
  agent_a:
    role: core_ui
    owns:
    - main/ui/**
    - main/ui/ui_phase1.c
  agent_b:
    role: storage_persistence
    owns:
    - main/storage/retained_blob_store.c
    - main/storage/retained_blob_store.h
  agent_c:
    role: core_mesh_rf
    owns:
    - main/mesh/**
    hotspot: main/mesh/meshcore_service.c
  agent_d:
    role: profile_command_admission
    owns:
    - main/comms/usb_command_parser.*
    - main/comms/usb_console.*
  agent_e:
    role: qa_package_audit
    owns:
    - scripts/core_smoke_d1l.py
    - scripts/core_ui_corruption_probe_d1l.py
    - scripts/core_release_gate_audit_d1l.py
    - scripts/package_release_d1l.py
    - tests/test_core_*
  agent_f:
    role: independent_review_evidence
    owns:
    - review_notes
    - operator_command_sheet
    - receipt_validation
work_packages:
- id: R0
  title: Freeze Core 1.0 product contract and sprint ledger
  owner: lead
  elapsed_window: H0.0-H0.5
  depends_on: []
  outputs:
  - release/24h-core branch
  - docs/release/24H_STATUS.md
  - exact starting SHA
  - file ownership table
  acceptance:
  - Core contract committed
  - PR199 explicitly deferred
  - SD marked conditional
  - no feature ambiguity
  hard_blocker: true
- id: R1
  title: Central immutable release profile
  owner: lead
  elapsed_window: H0.5-H3.0
  depends_on:
  - R0
  outputs:
  - main/app/release_profile.h
  - main/app/release_profile.c
  - version/health/profile fields
  - app snapshot capability binding
  tests:
  - release profile native/source contract tests
  acceptance:
  - profile deterministic
  - profile package-visible
  - runtime setting cannot change profile
  hard_blocker: true
- id: R2
  title: Core UI surface
  owner: agent_a
  elapsed_window: H0.5-H3.0
  depends_on:
  - R0
  outputs:
  - supported dock/home/settings routes
  - unavailable routes hidden
  - deep-link rejection
  - simulator references
  tests:
  - core navigation
  - unsupported route rejection
  - UI lifecycle focused tests
  acceptance:
  - only Home Messages Nodes Packets Settings reachable
  - no background work from unavailable screens
  hard_blocker: true
- id: R3
  title: Command and background-task admission
  owner: agent_d
  elapsed_window: H0.5-H3.0
  depends_on:
  - R1
  outputs:
  - profile-aware command allow/deny table
  - ESP_ERR_NOT_SUPPORTED contract
  - unavailable task startup disabled
  tests:
  - unsupported commands have no side effects
  - read-only status truth
  acceptance:
  - all deferred mutations rejected before side effects
  - response includes profile and feature IDs
  hard_blocker: true
- id: R4
  title: Rebase PR197 NVS duplicate-write suppression
  owner: agent_b
  elapsed_window: H0.5-H2.0
  depends_on:
  - R0
  outputs:
  - bounded retained NVS patch
  - updated manifests
  - native test
  tests:
  - duplicate writes do not add commits
  - changed payload still commits
  acceptance:
  - clean rebase/cherry-pick
  - focused tests green
  hard_blocker: false
- id: R5
  title: Conditional SD mode and NVS fallback
  owner: agent_b
  elapsed_window: H1.0-H3.0
  depends_on:
